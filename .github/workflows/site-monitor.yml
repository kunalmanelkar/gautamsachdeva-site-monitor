name: Daily Site Audit

on:
  schedule:
    - cron: '0 8 * * *'        # Daily at 8 AM UTC (1:30 PM IST)
  workflow_dispatch: {}         # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r site-monitor/requirements.txt
          playwright install chromium --with-deps

      - name: Run Playwright tests
        run: |
          pytest site-monitor/ \
            --json-report --json-report-file=results/latest.json \
            --screenshot=only-on-failure --output=screenshots \
            -v || true

      - name: Archive results with date
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ -f results/latest.json ]; then
            cp results/latest.json "results/${DATE}.json"
          fi

      - name: Generate HTML report
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p reports
          python generate_report.py -o "reports/${DATE}.html"
          cp "reports/${DATE}.html" report.html

      - name: Generate index page
        run: |
          mkdir -p _site
          cp reports/*.html _site/ 2>/dev/null || true
          python generate_index.py --reports-dir _site -o _site/index.html

      - name: Prune old screenshots (keep last 7 days)
        run: |
          find screenshots -type f -mtime +7 -not -name '.gitkeep' -delete 2>/dev/null || true

      - name: Commit results and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ reports/ screenshots/ 2>/dev/null || true
          SUMMARY=$(python3 -c "import json;s=json.load(open('results/latest.json'))['summary'];print(f\"{s.get('passed',0)} passed, {s.get('failed',0)} failed\")")
          git diff --cached --quiet || git commit -m "audit: $(date -u +%Y-%m-%d) — ${SUMMARY}"
          git push

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Publish pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 30
          if-no-files-found: ignore
