name: Daily Site Monitor

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8 AM UTC
  workflow_dispatch: {}    # Manual trigger

permissions:
  contents: write

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: site-monitor
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: site-monitor
        run: |
          pytest --json-report --json-report-file=results/latest.json \
                 --screenshot=only-on-failure --output=screenshots \
                 -v || true

      - name: Prune old screenshots (keep last 7 days)
        working-directory: site-monitor
        run: |
          find screenshots -type f -mtime +7 -not -name '.gitkeep' -delete 2>/dev/null || true

      - name: Archive results with date
        working-directory: site-monitor
        run: |
          if [ -f results/latest.json ]; then
            cp results/latest.json "results/$(date -u +%Y-%m-%d).json"
          fi

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site-monitor/results/ site-monitor/screenshots/
          git diff --cached --quiet || git commit -m "site-monitor: daily results $(date -u +%Y-%m-%d)"
          git push

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ github.run_number }}
          path: site-monitor/screenshots/
          retention-days: 30
          if-no-files-found: ignore
